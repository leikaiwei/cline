name: "Build VSIX Release"

on:
    push:
        tags:
            - "*"
    workflow_dispatch:
        inputs:
            tag:
                description: "Existing tag to build (e.g., v3.1.2)"
                required: true
                type: string

permissions:
    contents: write
    checks: write
    pull-requests: write

jobs:
    test:
        uses: ./.github/workflows/test.yml

    release:
        needs: test
        name: Build and Release VSIX
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
                  fetch-depth: 0
                  fetch-tags: true

            - name: Resolve Tag
              id: resolve_tag
              run: |
                  if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                    TAG="${{ github.event.inputs.tag }}"
                  else
                    TAG="${GITHUB_REF#refs/tags/}"
                  fi

                  if [[ -z "$TAG" ]]; then
                    echo "Error: tag input is required"
                    exit 1
                  fi

                  TAG_REF="refs/tags/$TAG"
                  git fetch origin --tags

                  if ! git show-ref --verify --quiet "$TAG_REF"; then
                    echo "Error: tag '$TAG' does not exist in the repository"
                    exit 1
                  fi

                  echo "Using tag '$TAG'."
                  git checkout --detach "$TAG_REF^{commit}"
                  echo "tag=$TAG" >> $GITHUB_OUTPUT
                  echo "resolved_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Install root dependencies
              run: npm install --include=optional

            - name: Install webview-ui dependencies
              run: cd webview-ui && npm install --include=optional

            - name: Install Packaging Tool
              run: npm install -g @vscode/vsce

            - name: Get Version
              id: get_version
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  echo "version=$VERSION" >> $GITHUB_OUTPUT

            - name: Package VSIX
              run: |
                  node scripts/run-vsce-command.mjs package --allow-package-secrets sendgrid --out "cline-${{ steps.get_version.outputs.version }}.vsix"
                  ls -lh "cline-${{ steps.get_version.outputs.version }}.vsix"

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v1
              with:
                  tag_name: ${{ steps.resolve_tag.outputs.tag }}
                  files: "*.vsix"
                  body: |
                      Automated VSIX build for `${{ steps.resolve_tag.outputs.tag }}`.

                      Download the attached `.vsix` file and install it manually in VS Code.
                  prerelease: ${{ contains(steps.resolve_tag.outputs.tag, '-') }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
